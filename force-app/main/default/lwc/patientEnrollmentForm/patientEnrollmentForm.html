<template>
    <lightning-card>
        <div class="slds-p-around_medium">
            <h1><Strong>Patient Enrollment Page</Strong></h1>
            <div>
                <lightning-button-icon 
                    icon-name="utility:edit" 
                    variant="brand" 
                    title="Edit" 
                    onclick={editForm}
                ></lightning-button-icon>
            </div>
        </div>
        <div class="slds-p-around_small">
            <template if:true={editMode}>
                <lightning-record-edit-form 
                    object-api-name="Account"
                    record-id={recordId}
                    onsuccess={handleSuccess}
                >
                    <lightning-input-field field-name="Name" value={accountName}></lightning-input-field>
                    <lightning-input-field field-name="Phone" value={accountPhone}></lightning-input-field>
                    <lightning-input-field field-name="Account_Email__c" value={accountEmail}></lightning-input-field>
                    <lightning-input-field field-name="Website" value={accountWebsite}></lightning-input-field>
                    <lightning-input-field field-name="Industry" value={accountIndustry}></lightning-input-field>
                    
                    <div class="slds-p-around_xx-small">
                        <c-address-manager-component edit-mode={editMode}></c-address-manager-component>
                    </div>
                    
                    <lightning-button type="submit" label="Save"></lightning-button>
                </lightning-record-edit-form>
            </template>

            <template if:false={editMode}>
                <lightning-record-view-form 
                    object-api-name="Account"
                    record-id={recordId}
                >
                    <lightning-output-field field-name="Name" value={accountName}></lightning-output-field>
                    <lightning-output-field field-name="Phone" value={accountPhone}></lightning-output-field>
                    <lightning-output-field field-name="Account_Email__c" value={accountEmail}></lightning-output-field>
                    <lightning-output-field field-name="Website" value={accountWebsite}></lightning-output-field>
                    <lightning-output-field field-name="Industry" value={accountIndustry}></lightning-output-field>
                    <lightning-output-field field-name="BillingAddress" value={accountAddress}></lightning-output-field>
                </lightning-record-view-form>
            </template>
        </div>
    </lightning-card>
</template>
