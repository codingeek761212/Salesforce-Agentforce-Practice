<template>
    <div class="slds-form-element__control">
        <div class="slds-combobox_container">
            <div>
                <label>Search:</label>
            </div>
            <div class="slds-grid">
                
                <div class="slds-col slds-size_3-of-12">
                    <lightning-combobox value={objectApiName} options={lookupObjectOptions} onchange={handleSelectedObject}></lightning-combobox> 
                </div>
                <div class="slds-col slds-size_9-of-12">
                    <lightning-input type="search" value={searchKey} onchange={handleSearchValue}></lightning-input>
                </div>
            </div>
                
            <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click">
                <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                        <template for:each={allFetchedValues} for:item="fetchedValue">
                            <li key={fetchedValue.value} role="presentation" class="slds-listbox__item" 
                                data-id={fetchedValue.value} data-name={fetchedValue.label}  onclick={selectOption} >
                                <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                    
                                    <span class="slds-media__body">
                                        <span class="slds-truncate">{fetchedValue.label}</span>
                                    </span>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
            <template lwc:if={areValuesSelected}>
                <div>
                    <template for:each={selectedValues} for:item="selectedValue">
                        <div key={selectedValue.value}>
                            <lightning-pill label={selectedValue.label} name={selectedValue.value} value={selectedValue.value} onremove={removeSelectedValue}></lightning-pill>                        
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </div>
</template>
